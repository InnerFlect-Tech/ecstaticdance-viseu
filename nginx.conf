server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ──────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/html
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff
        font/woff2;

    # ── Security headers ─────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"          always;
    add_header X-Frame-Options         "SAMEORIGIN"        always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    # ── Cache: versioned assets (hash in filename) ────────────
    location ~* /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Cache: other static assets ───────────────────────────
    location ~* \.(ico|png|jpg|jpeg|gif|webp|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── PHP (Docker / Coolify): API + admin + uploads → php built-in no mesmo contentor ──
    location ^~ /api {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        client_max_body_size 25m;
    }
    location ^~ /admin {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
    location ^~ /uploads {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        client_max_body_size 25m;
    }

    # ── HTML pages: no-cache so changes deploy immediately ────
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # ── Coming soon (Docker): brochure pages → splash only (not /links, /api, /admin, /uploads).
    #    PHP /api e /admin: mesmo contentor (php -S em 127.0.0.1:8080) ou cPanel — ver README / docs/DEPLOYMENT.md.
    #    Exact match first (same list as regex) so /buy never falls through to try_files.
    location = /buy.html { return 302 /; }
    location = /buy { return 302 /; }
    location = /buy/ { return 302 /; }
    location ~* ^/(sobre|eventos|galeria|faq|contacto|bilhetes|buy|ticket)\.html$ {
        return 302 /;
    }
    location ~ ^/(sobre|eventos|galeria|faq|contacto|bilhetes|buy|ticket)/?$ {
        return 302 /;
    }

    # ── Main routing: extensionless URIs (/faq → faq.html) ─────────
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # ── Custom 404 ───────────────────────────────────────────
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
