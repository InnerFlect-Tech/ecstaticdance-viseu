# Produção Coolify DESTE repo: usa Build Pack Dockerfile (nginx+PHP), não Nixpacks.
# Isto é só preview / stacks alternativos (Node `npm run start`). Ver docs/COOLIFY.md secção 7.

[phases.setup]
# Node + PHP 8.3 (Nix) para o proxy /api → 127.0.0.1:8080 — ver scripts/start-preview-with-php.sh.
nixPkgs = ["nodejs_22", "php83"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run start"

