<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Ecstatic Dance Viseu — novo site em breve. Ligações e bilhetes na página oficial do evento." />
  <meta name="robots" content="index,follow" />
  <meta property="og:title"       content="Ecstatic Dance Viseu — Em breve" />
  <meta property="og:description" content="Website completo brevemente. Ligações úteis e bilhetes: ecstaticdanceviseu.pt/links" />
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://ecstaticdanceviseu.pt/" />
  <link rel="canonical"           href="https://ecstaticdanceviseu.pt/" />
  <title>Em breve — Ecstatic Dance Viseu</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bone: #F5EFE6;
      --dark: #1A1210;
      --gold: #B8924A;
      --terra: #C4593F;
    }
    body {
      background: var(--bone);
      color: var(--dark);
      font-family: "DM Sans", system-ui, sans-serif;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1.5rem;
      gap: 1.25rem;
    }
    .mark {
      display: block;
    }
    .mark img {
      width: clamp(140px, 36vw, 220px);
      height: auto;
      display: block;
    }
    .eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--terra);
      opacity: 0.72;
      font-weight: 500;
    }
    h1 {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(1.85rem, 5vw, 2.65rem);
      font-weight: 400;
      line-height: 1.25;
      max-width: 18ch;
    }
    p.lead {
      font-size: 1rem;
      line-height: 1.6;
      opacity: 0.78;
      max-width: 36ch;
    }
    .links-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.85rem 1.25rem;
      margin-top: 0.5rem;
    }
    .links-row a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      border-bottom: 1px solid rgba(184, 146, 74, 0.45);
      padding-bottom: 2px;
    }
    .lang-en a {
      color: var(--gold);
      text-decoration: underline;
    }
    .lang-en {
      font-size: 0.85rem;
      opacity: 0.55;
      max-width: 34ch;
      margin-top: 0.75rem;
    }
  </style>
</head>
<body>
  <div class="mark">
    <img
      src="/images/branding/logo_black.png"
      alt="Ecstatic Dance Viseu"
      width="220"
      height="220"
      decoding="async"
    />
  </div>
  <p class="eyebrow">Ecstatic Dance Viseu</p>
  <h1>O site completo chega em breve.</h1>
  <p class="lead">Informações sobre o primeiro evento, bilhetes e FAQs estão reunidos na nossa página de ligações.</p>
  <div class="links-row">
    <a href="/links">Ir para página de ligações</a>
    <a href="mailto:info@ecstaticdanceviseu.pt">info@ecstaticdanceviseu.pt</a>
  </div>
  <p class="lang-en" lang="en">Full website coming soon. Event info and tickets:<br /><a href="/links">ecstaticdanceviseu.pt/links</a></p>
</body>
</html>
