server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ──────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/html
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff
        font/woff2;

    # ── Security headers ─────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"          always;
    add_header X-Frame-Options         "SAMEORIGIN"        always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    # ── Cache: versioned assets (hash in filename) ────────────
    location ~* /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Cache: other static assets ───────────────────────────
    location ~* \.(ico|png|jpg|jpeg|gif|webp|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── HTML pages: no-cache so changes deploy immediately ────
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # ── Main routing: extensionless URIs (/faq → faq.html) ─────────
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # ── Custom 404 ───────────────────────────────────────────
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
