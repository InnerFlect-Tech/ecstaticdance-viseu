<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Ecstatic Dance Viseu — Just let's dance! Bilhetes e FAQs na página de ligações." />
  <meta name="robots" content="index,follow" />
  <meta property="og:title"       content="Ecstatic Dance Viseu" />
  <meta property="og:description" content="Just let's dance! — bilhetes e ligações úteis: ecstaticdanceviseu.pt/links" />
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://ecstaticdanceviseu.pt/" />
  <link rel="canonical"           href="https://ecstaticdanceviseu.pt/" />
  <title>Ecstatic Dance Viseu</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bone: #F5EFE6;
      --dark: #1A1210;
      --gold: #B8924A;
      --terra: #C4593F;
    }
    body {
      background: var(--bone);
      color: var(--dark);
      font-family: "DM Sans", system-ui, sans-serif;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1.5rem;
      gap: 1.25rem;
    }
    .mark {
      display: block;
    }
    .mark img {
      width: clamp(140px, 36vw, 220px);
      height: auto;
      display: block;
    }
    h1 {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(1.85rem, 5vw, 2.65rem);
      font-weight: 400;
      line-height: 1.25;
      max-width: 18ch;
    }
    .roth-line {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(1.05rem, 3vw, 1.35rem);
      color: var(--terra);
      opacity: 0.88;
      letter-spacing: 0.04em;
      max-width: 22ch;
      margin-top: -0.35rem;
    }
    .ticket-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: baseline;
      gap: 0.35rem 0.65rem;
    }
    p.lead {
      font-size: 1rem;
      line-height: 1.6;
      opacity: 0.78;
      max-width: none;
    }
    .lead a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px solid rgba(184, 146, 74, 0.45);
      padding-bottom: 2px;
    }
    .lang-en a {
      color: var(--gold);
      text-decoration: underline;
    }
    .ticket-row .lang-en {
      margin-top: 0;
    }
    .lang-en {
      font-size: 0.85rem;
      opacity: 0.55;
      max-width: none;
    }
  </style>
</head>
<body>
  <div class="mark">
    <img
      src="/images/branding/logo_black.png"
      alt="Ecstatic Dance Viseu"
      width="220"
      height="220"
      decoding="async"
    />
  </div>
  <h1>Just let's dance!</h1>
  <p class="roth-line" lang="en">Sweat your prayers</p>
  <div class="ticket-row">
    <p class="lead">Apanha já o teu bilhete <a href="/links">aqui</a>.</p>
    <p class="lang-en" lang="en">Grab yours <a href="/links">here</a>.</p>
  </div>
</body>
</html>
