<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página não encontrada — Ecstatic Dance Viseu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bone: #F5EFE6;
      --dark: #1A1210;
      --gold: #B8924A;
      --terra: #C4593F;
    }
    body {
      background: var(--bone);
      color: var(--dark);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      text-align: center;
      padding: 2rem;
      gap: 1.5rem;
    }
    .eyebrow {
      font-size: .75rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--terra);
      opacity: .7;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 300;
      color: var(--gold);
      line-height: 1;
    }
    p {
      font-size: 1rem;
      color: rgba(26,18,16,.6);
      font-weight: 300;
      max-width: 36ch;
      line-height: 1.7;
    }
    a {
      display: inline-block;
      margin-top: 1rem;
      padding: .9rem 2.25rem;
      background: var(--terra);
      color: #fff;
      text-decoration: none;
      font-size: .82rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      transition: opacity .2s;
    }
    a:hover { opacity: .85; }
  </style>
</head>
<body>
  <p class="eyebrow">Erro 404</p>
  <h1>404</h1>
  <p>Esta página não existe ou foi movida. Volta ao início e encontra o que procuras.</p>
  <a href="/">Voltar ao início</a>
</body>
</html>
